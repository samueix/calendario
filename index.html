<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioScale Ultra - Escala Maracanaú 3x3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --work: #ef4444;
            --work-glow: rgba(239, 68, 68, 0.4);
            --rest: #22c55e;
            --rest-glow: rgba(34, 197, 94, 0.4);
            --text: #ffffff;
            --text-secondary: #cbd5e1;
            --border: rgba(255, 255, 255, 0.15);
            --surface: rgba(30, 41, 59, 0.7);
            --glass: rgba(15, 23, 42, 0.6);
        }

        [data-theme="light"] {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --work: #dc2626;
            --work-glow: rgba(220, 38, 38, 0.3);
            --rest: #16a34a;
            --rest-glow: rgba(22, 163, 74, 0.3);
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: rgba(0, 0, 0, 0.1);
            --surface: rgba(255, 255, 255, 0.85);
            --glass: rgba(248, 250, 252, 0.9);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text);
            overflow: hidden;
            position: relative;
        }

        /* 🌌 GALAXY BACKGROUND */
        .galaxy-bg {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(120, 0, 255, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 100, 255, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(79, 70, 229, 0.15) 0%, transparent 70%),
                linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            z-index: -3;
        }

        /* ✨ Animated Stars */
        .stars {
            position: fixed;
            inset: 0;
            z-index: -2;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration, 3s) ease-in-out infinite;
            opacity: var(--opacity, 0.8);
        }

        @keyframes twinkle {
            0%, 100% { opacity: var(--opacity, 0.8); transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        /* 🌠 Shooting Stars */
        .shooting-star {
            position: fixed;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px 2px white, 0 0 20px 4px rgba(255,255,255,0.5);
            animation: shoot 3s linear infinite;
            opacity: 0;
            z-index: -1;
        }

        @keyframes shoot {
            0% {
                transform: translateX(0) translateY(0) rotate(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            30% {
                opacity: 1;
            }
            100% {
                transform: translateX(var(--tx, 200px)) translateY(var(--ty, 200px)) rotate(45deg);
                opacity: 0;
            }
        }

        /* Nebula effects */
        .nebula {
            position: fixed;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
            z-index: -2;
            animation: float 20s ease-in-out infinite;
        }

        .nebula-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.6), transparent 70%);
            top: 10%;
            right: 10%;
            animation-delay: 0s;
        }

        .nebula-2 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.5), transparent 70%);
            bottom: 20%;
            left: 15%;
            animation-delay: -5s;
        }

        .nebula-3 {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.4), transparent 70%);
            top: 60%;
            right: 25%;
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(20px, -20px) scale(1.05); }
            50% { transform: translate(-10px, 10px) scale(0.95); }
            75% { transform: translate(15px, 5px) scale(1.02); }
        }

        /* Calendar App */
        #calendar-app {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 620px;
            border: 1px solid var(--border);
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 10;
            transition: transform 0.3s ease;
        }

        #calendar-app:hover {
            transform: translateY(-2px);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .header h2 {
            margin: 0;
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: capitalize;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .nav-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.25s ease;
            box-shadow: 0 4px 14px rgba(79, 70, 229, 0.4);
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.6);
        }

        .nav-btn:active {
            transform: translateY(0);
        }

        .nav-btn.secondary {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            box-shadow: none;
        }

        .nav-btn.secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            padding: 8px 0 12px;
            border-bottom: 1px solid var(--border);
        }

        .weekdays div {
            text-align: center;
            font-weight: 700;
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-top: 8px;
        }

        .cell {
            aspect-ratio: 1;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid var(--border);
            font-size: 1rem;
            position: relative;
            background: var(--surface);
            color: var(--text);
            overflow: hidden;
        }

        .cell::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.1), transparent 60%);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .cell:hover::before {
            opacity: 1;
        }

        .cell:hover {
            transform: translateY(-3px) scale(1.03);
            border-color: var(--primary);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.3);
            z-index: 2;
        }

        .cell.trabalho {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2), rgba(220, 38, 38, 0.15));
            border: 2px solid var(--work);
            color: #fff;
            font-weight: 700;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
            box-shadow: 0 0 20px var(--work-glow);
        }

        .cell.trabalho:hover {
            box-shadow: 0 0 35px var(--work-glow), 0 8px 25px rgba(239, 68, 68, 0.4);
        }

        .cell.folga {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.25), rgba(22, 163, 74, 0.2));
            border: 2px solid var(--rest);
            color: #fff;
            font-weight: 700;
            text-shadow: 0 1px 3px rgba(0,0,0,0.3);
            box-shadow: 0 0 20px var(--rest-glow);
        }

        .cell.folga:hover {
            box-shadow: 0 0 35px var(--rest-glow), 0 8px 25px rgba(34, 197, 94, 0.4);
        }

        .cell.today {
            border: 2px solid var(--primary);
            box-shadow: 
                0 0 0 4px rgba(99, 102, 241, 0.2),
                0 0 30px rgba(99, 102, 241, 0.4);
            position: relative;
        }

        .cell.today::after {
            content: '';
            position: absolute;
            bottom: 6px;
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 28px;
            padding: 18px 0 12px;
            border-top: 1px solid var(--border);
            margin-top: 16px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-dot {
            width: 14px;
            height: 14px;
            border-radius: 5px;
            box-shadow: 0 0 12px currentColor;
        }

        .legend-dot.work { 
            background: var(--work); 
            color: var(--work);
        }
        .legend-dot.rest { 
            background: var(--rest); 
            color: var(--rest);
        }

        /* Modal */
        #modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-box {
            background: var(--surface);
            backdrop-filter: blur(15px);
            padding: 28px;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--border);
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.1);
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-box h3 {
            margin: 0 0 6px 0;
            font-size: 1.2rem;
            color: var(--text);
            font-weight: 700;
        }

        .modal-box p {
            margin: 0 0 18px 0;
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 500;
        }

        #note-area {
            width: 100%;
            height: 110px;
            margin: 12px 0;
            border-radius: 10px;
            padding: 14px;
            background: rgba(0, 0, 0, 0.2);
            color: var(--text);
            border: 1px solid var(--border);
            font-family: inherit;
            font-size: 0.95rem;
            resize: vertical;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        #note-area:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
        }

        #note-area::placeholder {
            color: var(--text-secondary);
            opacity: 0.7;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        .modal-actions .nav-btn {
            flex: 1;
            justify-content: center;
            padding: 11px 16px;
        }

        .modal-actions .nav-btn.cancel {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
            box-shadow: none;
        }

        .modal-actions .nav-btn.cancel:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
        }

        /* Status indicator badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 4px;
        }

        .status-badge.work {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.4);
        }

        .status-badge.rest {
            background: rgba(34, 197, 94, 0.2);
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, 0.4);
        }

        /* Responsive */
        @media (max-width: 480px) {
            #calendar-app {
                padding: 18px 16px;
                border-radius: 16px;
            }
            
            .header h2 {
                font-size: 1.15rem;
            }
            
            .nav-btn {
                padding: 9px 14px;
                font-size: 0.8rem;
            }
            
            .cell {
                font-size: 0.9rem;
                border-radius: 10px;
            }
            
            .weekdays div {
                font-size: 0.65rem;
            }
            
            .legend {
                gap: 20px;
                font-size: 0.85rem;
            }
        }

        /* Print styles */
        @media print {
            .galaxy-bg, .stars, .shooting-star, .nebula {
                display: none !important;
            }
            body {
                background: white !important;
            }
            #calendar-app {
                box-shadow: none !important;
                border: 1px solid #ccc !important;
            }
        }
    </style>
</head>
<body data-theme="dark">

    <!-- 🌌 Galaxy Background Elements -->
    <div class="galaxy-bg"></div>
    <div class="stars" id="stars"></div>
    <div class="nebula nebula-1"></div>
    <div class="nebula nebula-2"></div>
    <div class="nebula nebula-3"></div>

    <div id="calendar-app">
        <div class="header">
            <h2 id="month-title">Carregando...</h2>
            <div class="header-actions">
                <button class="nav-btn secondary" onclick="toggleTheme()" title="Alternar tema">
                    <i class="fas fa-moon"></i>
                </button>
                <button class="nav-btn" onclick="exportImg()" title="Exportar calendário">
                    <i class="fas fa-download"></i> Exportar
                </button>
            </div>
        </div>

        <div class="weekdays">
            <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
        </div>

        <div class="grid" id="calendar-grid"></div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-dot work"></div>
                <span>Plantão</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot rest"></div>
                <span>Folga</span>
            </div>
        </div>

        <div style="display: flex; justify-content: space-between; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border);">
            <button class="nav-btn secondary" onclick="changeMonth(-1)">
                <i class="fas fa-chevron-left"></i> Anterior
            </button>
            <button class="nav-btn secondary" onclick="changeMonth(1)">
                Próximo <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>

    <div id="modal" onclick="closeModal()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <h3 id="m-date">Data</h3>
            <p id="m-status">
                <span id="status-badge" class="status-badge"></span>
            </p>
            <textarea id="note-area" placeholder="Adicionar anotação profissional..."></textarea>
            <div class="modal-actions">
                <button class="nav-btn cancel" onclick="closeModal()">Cancelar</button>
                <button class="nav-btn" onclick="saveNote()">Salvar</button>
            </div>
        </div>
    </div>

    <script>
        const BASE_DATE = new Date(2026, 3, 23);
        let viewDate = new Date();
        let notes = JSON.parse(localStorage.getItem('notes_corp') || '{}');
        let currentTheme = localStorage.getItem('theme') || 'dark';

        // 🌟 Create animated stars
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const starCount = 120;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
                star.style.setProperty('--opacity', Math.random() * 0.5 + 0.3);
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
            
            // Create shooting stars occasionally
            setInterval(() => {
                createShootingStar();
            }, 4000);
        }

        function createShootingStar() {
            const star = document.createElement('div');
            star.className = 'shooting-star';
            
            // Random starting position (top or left edge)
            const startFromTop = Math.random() > 0.5;
            if (startFromTop) {
                star.style.left = Math.random() * 100 + '%';
                star.style.top = '-10px';
                star.style.setProperty('--tx', (Math.random() - 0.5) * 300 + 'px');
                star.style.setProperty('--ty', '300px');
            } else {
                star.style.left = '-10px';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--tx', '300px');
                star.style.setProperty('--ty', (Math.random() - 0.5) * 300 + 'px');
            }
            
            document.body.appendChild(star);
            
            // Remove after animation
            setTimeout(() => star.remove(), 3000);
        }

        // Escala 3x3
        function getStatus(date) {
            const d1 = new Date(BASE_DATE.getFullYear(), BASE_DATE.getMonth(), BASE_DATE.getDate());
            const d2 = new Date(date.getFullYear(), date.getMonth(), date.getDate());
            const diff = Math.floor((d2 - d1) / (1000 * 60 * 60 * 24));
            let index = diff % 6;
            if (index < 0) index += 6;
            return (index >= 1 && index <= 3) ? 'trabalho' : 'folga';
        }

        function render() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            
            document.getElementById('month-title').innerText = 
                new Intl.DateTimeFormat('pt-BR', { month: 'long', year: 'numeric' }).format(viewDate);

            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            const startDay = new Date(year, month, 1).getDay();
            const totalDays = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < startDay; i++) {
                const empty = document.createElement('div');
                grid.appendChild(empty);
            }

            for (let d = 1; d <= totalDays; d++) {
                const date = new Date(year, month, d);
                const status = getStatus(date);
                const cell = document.createElement('div');
                
                cell.className = `cell ${status}`;
                if (date.toDateString() === new Date().toDateString()) {
                    cell.classList.add('today');
                }
                
                cell.innerHTML = `<span>${d}</span>`;
                cell.onclick = () => openModal(date, status);
                grid.appendChild(cell);
            }
        }

        function openModal(date, status) {
            const key = `${date.getFullYear()}-${date.getMonth()}-${date.getDate()}`;
            const statusText = status === 'trabalho' ? 'Plantão' : 'Folga';
            const statusClass = status;
            
            document.getElementById('m-date').innerText = 
                date.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
            
            const badge = document.getElementById('status-badge');
            badge.className = `status-badge ${statusClass}`;
            badge.innerHTML = status === 'trabalho' 
                ? '<i class="fas fa-briefcase"></i> Plantão' 
                : '<i class="fas fa-check-circle"></i> Folga';
            
            document.getElementById('note-area').value = notes[key] || '';
            document.getElementById('modal').style.display = 'flex';
            window.currentKey = key;
        }

        function saveNote() {
            if (window.currentKey) {
                notes[window.currentKey] = document.getElementById('note-area').value;
                localStorage.setItem('notes_corp', JSON.stringify(notes));
            }
            closeModal();
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function changeMonth(delta) {
            viewDate.setMonth(viewDate.getMonth() + delta);
            render();
        }

        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', currentTheme);
            localStorage.setItem('theme', currentTheme);
            
            // Update icon
            const btn = document.querySelector('.nav-btn.secondary i');
            if (btn) {
                btn.className = currentTheme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
            }
        }

        function exportImg() {
            const app = document.getElementById('calendar-app');
            html2canvas(app, { 
                backgroundColor: currentTheme === 'dark' ? '#0f0c29' : '#ffffff',
                scale: 2,
                useCORS: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `escala-bioscale-${viewDate.getFullYear()}-${String(viewDate.getMonth()+1).padStart(2,'0')}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            createStars();
            applyTheme();
            render();
            
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeModal();
            });
        });

        function applyTheme() {
            const btn = document.querySelector('.nav-btn.secondary i');
            if (btn) {
                btn.className = currentTheme === 'dark' ? 'fas fa-moon' : 'fas fa-sun';
            }
        }
    </script>
</body>
</html>
